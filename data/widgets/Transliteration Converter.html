<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliteration Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white h-screen flex flex-col font-sans text-gray-900">

    <main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
        
        <div class="flex-1 flex flex-col min-h-0 relative">
            <div class="flex justify-between items-center mb-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Transliteration (Latin)</label>
                <button onclick="copyText('transliteration')" class="text-gray-400 hover:text-indigo-600 text-xs flex items-center gap-1">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy
                </button>
            </div>
            <textarea id="transliteration" class="flex-1 w-full p-4 bg-gray-50 border border-gray-300 rounded-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none resize-none font-mono text-sm" placeholder="Enter latin text..."></textarea>
        </div>

        <div class="flex flex-col gap-2 shrink-0">
            <div class="flex gap-2 justify-center items-stretch">
                <button onclick="runTransliterationToSyllabary()" class="flex-1 bg-gray-800 hover:bg-black text-white px-4 py-3 text-sm font-medium flex items-center justify-center gap-2 rounded-sm">
                    <span>To Syllabary</span>
                    <i data-lucide="arrow-down" class="w-4 h-4"></i>
                </button>
                <button onclick="clearAll()" class="px-4 bg-gray-100 hover:bg-red-50 text-gray-500 border border-gray-200 rounded-sm">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
                <button onclick="runSyllabaryToTransliteration()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-900 px-4 py-3 text-sm font-medium flex items-center justify-center gap-2 border border-gray-300 rounded-sm">
                    <i data-lucide="arrow-up" class="w-4 h-4"></i>
                    <span>To Latin</span>
                </button>
            </div>
            <div id="status-msg" class="text-center text-xs text-transparent h-4 font-medium transition-all">Status</div>
        </div>

        <div class="flex-1 flex flex-col min-h-0 relative">
            <div class="flex justify-between items-center mb-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Syllabary</label>
                <button onclick="copyText('syllabary')" class="text-gray-400 hover:text-emerald-600 text-xs flex items-center gap-1">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy
                </button>
            </div>
            <textarea id="syllabary" class="flex-1 w-full p-4 bg-gray-50 border border-gray-300 rounded-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none resize-none text-lg" placeholder="Syllabary output..."></textarea>
        </div>

    </main>

    <script>
        lucide.createIcons();

        function runTransliterationToSyllabary() {
            const input = document.getElementById('transliteration');
            const output = document.getElementById('syllabary');
            
            // Check if elements exist before reading .value
            if (!input || !output) {
                console.error("Could not find text areas in the HTML!");
                return;
            }

            if (input.value) {
                output.value = "[Syllabary Result] " + input.value;
                showStatus("Converted to Syllabary", "text-indigo-600");
            }
        }

        function runSyllabaryToTransliteration() {
            const input = document.getElementById('syllabary');
            const output = document.getElementById('transliteration');

            if (!input || !output) return;

            if (input.value) {
                output.value = "[Latin Result] " + input.value;
                showStatus("Converted to Latin", "text-emerald-600");
            }
        }

        function clearAll() {
            document.getElementById('transliteration').value = '';
            document.getElementById('syllabary').value = '';
            showStatus("Cleared", "text-red-500");
        }

        function copyText(elementId) {
            const el = document.getElementById(elementId);
            if (!el || !el.value) return;
            el.select();
            document.execCommand('copy');
            showStatus("Copied!", "text-gray-700");
        }

        function showStatus(msg, colorClass) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = `text-center text-xs h-4 font-bold ${colorClass}`;
            setTimeout(() => { el.className = "text-center text-xs text-transparent h-4"; }, 2000);
        }
    </script>
</body>
</html>
