<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learn ᏣᎳᎩ Syllabary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Cherokee&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        earth: { bg: '#f7f3e8', text: '#3e2723', primary: '#b71c1c', secondary: '#d7ccc8', accent: '#e65100', card: '#fffdf5', border: '#8d6e63' },
                        midnight: { bg: '#0f172a', text: '#f1f5f9', primary: '#f97316', secondary: '#1e293b', accent: '#38bdf8', card: '#1e293b', border: '#334155' }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        cherokee: ['Noto Sans Cherokee', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .bg-grid-pattern {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
        .dark .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .instant-hidden { visibility: hidden; opacity: 0; }
        .instant-visible { visibility: visible; opacity: 1; }

        @media (max-height: 500px) {
            .keyboard-hide { display: none !important; }
            .keyboard-compact { margin-bottom: 0.5rem !important; margin-top: 0.5rem !important; }
            .compact-text { font-size: 4rem !important; }
        }
    </style>
</head>
<body class="bg-earth-bg text-earth-text transition-colors duration-300 antialiased h-screen flex flex-col overflow-hidden select-none">

    <header class="h-16 shrink-0 flex items-center justify-between px-4 border-b border-earth-secondary dark:border-midnight-border bg-earth-card dark:bg-midnight-card shadow-sm z-10 transition-colors duration-300">
        <div class="flex items-center gap-2">
            <button id="nav-back" class="hidden p-2 rounded-full hover:bg-earth-secondary/20 dark:hover:bg-white/10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Learn ᏣᎳᎩ Syllabary</h1>
        </div>
        <button id="theme-toggle" class="p-2 rounded-full bg-earth-secondary/30 dark:bg-midnight-secondary border border-transparent hover:border-earth-primary dark:hover:border-midnight-primary transition-all">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-earth-primary dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-midnight-primary hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>
    </header>

    <main id="app-container" class="flex-1 relative overflow-hidden">
        
        <div id="view-home" class="absolute inset-0 flex flex-col items-center justify-center p-6 space-y-8 fade-in overflow-y-auto">
            <div class="w-full max-w-sm space-y-4">
                <button onclick="App.startSelection('write')" class="w-full group relative flex flex-col items-center p-6 bg-white dark:bg-midnight-secondary border-2 border-earth-secondary dark:border-midnight-border rounded-2xl shadow-md hover:border-earth-primary dark:hover:border-midnight-primary transition-all active:scale-95">
                    <div class="h-16 w-16 bg-earth-bg dark:bg-slate-700 rounded-full flex items-center justify-center mb-3 group-hover:bg-earth-primary/10 dark:group-hover:bg-midnight-primary/20 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-earth-primary dark:text-midnight-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                    </div>
                    <span class="text-xl font-bold">Handwriting Practice</span>
                    <span class="text-sm opacity-60">See "sa", Write "Ꮜ"</span>
                </button>
                <button onclick="App.startSelection('read')" class="w-full group relative flex flex-col items-center p-6 bg-white dark:bg-midnight-secondary border-2 border-earth-secondary dark:border-midnight-border rounded-2xl shadow-md hover:border-earth-primary dark:hover:border-midnight-primary transition-all active:scale-95">
                    <div class="h-16 w-16 bg-earth-bg dark:bg-slate-700 rounded-full flex items-center justify-center mb-3 group-hover:bg-earth-primary/10 dark:group-hover:bg-midnight-primary/20 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-earth-primary dark:text-midnight-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                    </div>
                    <span class="text-xl font-bold">Reading Practice</span>
                    <span class="text-sm opacity-60">See "Ꮜ", Type "sa"</span>
                </button>
            </div>
        </div>

        <div id="view-selection" class="absolute inset-0 hidden flex flex-col bg-earth-bg dark:bg-midnight-bg fade-in">
            <div class="bg-earth-card dark:bg-midnight-card shadow-sm z-10 border-b border-earth-secondary dark:border-slate-700">
                <div class="p-4 pb-2">
                    <h2 class="text-xl font-bold mb-1">Select Syllabary</h2>
                    <div class="flex items-center justify-between">
                        <p class="text-sm opacity-70">Tap syllables to toggle.</p>
                        <label class="flex items-center space-x-2 font-bold text-earth-primary dark:text-midnight-primary cursor-pointer select-none">
                            <input type="checkbox" id="check-all" class="w-5 h-5 rounded border-gray-300 text-earth-primary focus:ring-earth-primary">
                            <span>Select All</span>
                        </label>
                    </div>
                </div>
                
                <div id="tracing-toggle-container" class="hidden flex items-center justify-between px-4 py-3 bg-earth-secondary/10 dark:bg-slate-800/50 border-t border-earth-secondary/20 dark:border-slate-700">
                    <div class="flex flex-col">
                        <span class="font-bold text-sm">Tracing Mode</span>
                        <span class="text-xs opacity-60">Show faint outline to trace</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="tracing-checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-earth-primary dark:peer-checked:bg-midnight-primary"></div>
                    </label>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-24" id="rows-container">
                </div>

            <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-earth-bg via-earth-bg to-transparent dark:from-midnight-bg dark:via-midnight-bg">
                <button onclick="App.startSession()" class="w-full py-4 rounded-xl font-bold text-lg text-white bg-earth-primary dark:bg-midnight-primary shadow-lg hover:brightness-110 active:scale-95 transition-all">
                    Start Practice
                </button>
            </div>
        </div>

        <div id="view-writing" class="absolute inset-0 hidden flex flex-col p-4 overflow-y-auto">
            <div class="w-full bg-earth-secondary/30 dark:bg-slate-700 rounded-full h-2 mb-4 shrink-0">
                <div id="write-progress" class="h-2 rounded-full bg-earth-primary dark:bg-midnight-primary transition-all duration-300 w-0"></div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-start w-full min-h-0">
                <div class="text-center mb-4 shrink-0 mt-2">
                    <p class="text-sm uppercase tracking-widest opacity-60 font-bold">Write the character for</p>
                    <h2 id="write-prompt" class="text-6xl font-extrabold mt-1 text-earth-text dark:text-white"></h2>
                </div>

                <div id="canvas-container" class="relative w-full max-w-[400px] aspect-square bg-white dark:bg-slate-800 rounded-2xl shadow-inner border-2 border-earth-secondary dark:border-slate-600 overflow-hidden mb-4 shrink-0 bg-grid-pattern touch-none">
                    <canvas id="drawing-canvas" class="absolute inset-0 w-full h-full cursor-crosshair touch-none"></canvas>
                    
                    <div id="write-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none instant-hidden z-10">
                        <span id="write-answer" class="text-[13rem] leading-none font-cherokee text-earth-primary dark:text-midnight-primary"></span>
                    </div>

                    <div class="absolute top-2 right-2 flex gap-2 z-20">
                        <button onclick="App.clearCanvas()" class="p-2 bg-gray-200 dark:bg-slate-700 rounded-full opacity-60 hover:opacity-100 transition-opacity" title="Clear">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>

                <div class="w-full max-w-[400px] mt-auto mb-4 shrink-0">
                    <button id="btn-write-submit" onclick="App.checkWriting()" class="w-full py-4 rounded-xl font-bold text-lg text-white bg-earth-primary dark:bg-midnight-primary shadow-md hover:brightness-110 active:scale-95 transition-all">
                        Show Answer
                    </button>

                    <div id="write-feedback-ui" class="hidden grid grid-cols-2 gap-3 w-full">
                        <button onclick="App.rateWriting(false)" class="py-4 rounded-xl font-bold bg-red-100 text-red-700 border-2 border-red-200 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800 transition-colors">
                            Needs Work
                        </button>
                        <button onclick="App.rateWriting(true)" class="py-4 rounded-xl font-bold bg-green-100 text-green-700 border-2 border-green-200 hover:bg-green-200 dark:bg-green-900/30 dark:text-green-300 dark:border-green-800 transition-colors">
                            Good
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-reading" class="absolute inset-0 hidden flex flex-col p-4 overflow-y-auto">
            <div class="w-full bg-earth-secondary/30 dark:bg-slate-700 rounded-full h-2 mb-4 shrink-0">
                <div id="read-progress" class="h-2 rounded-full bg-earth-primary dark:bg-midnight-primary transition-all duration-300 w-0"></div>
            </div>
            
            <div class="flex-1 flex flex-col items-center justify-start mt-4 min-h-0">
                <div class="text-center w-full">
                    <p class="text-sm uppercase tracking-widest opacity-60 font-bold mb-4 keyboard-hide">What sound is this?</p>
                    <div class="relative flex items-center justify-center mb-8 keyboard-compact">
                        <h2 id="read-prompt" class="text-9xl compact-text font-bold font-cherokee text-earth-text dark:text-white transition-transform duration-300 leading-none"></h2>
                    </div>
                    <div class="w-full max-w-xs mx-auto relative group mb-8">
                        <input type="text" id="read-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" 
                            class="w-full bg-transparent border-b-4 border-earth-secondary dark:border-slate-600 text-center text-5xl font-bold py-2 focus:outline-none focus:border-earth-primary dark:focus:border-midnight-primary text-earth-text dark:text-white transition-colors" placeholder="?">
                    </div>
                    <div id="read-feedback" class="h-8 mt-4 font-bold text-lg opacity-0 transition-opacity"></div>
                </div>
            </div>
        </div>

        <div id="view-results" class="absolute inset-0 hidden flex flex-col p-6 overflow-hidden fade-in bg-earth-bg dark:bg-midnight-bg">
            <div class="text-center mb-4 shrink-0">
                <h2 class="text-xl font-bold">Results</h2>
            </div>
            <div class="flex-1 overflow-y-auto -mx-6 px-6 pb-4" id="results-scroll-container">
                <div id="results-list" class="space-y-6"></div>
            </div>
            <div class="mt-4 pt-4 border-t border-earth-secondary dark:border-slate-700 shrink-0 space-y-3">
                <button onclick="App.retrySession()" class="w-full py-4 rounded-xl font-bold text-lg text-white bg-earth-primary dark:bg-midnight-primary shadow-lg hover:brightness-110 active:scale-95 transition-all">
                    Practice Again
                </button>
                <button onclick="App.showView('selection')" class="w-full py-3 rounded-xl font-bold text-earth-text dark:text-slate-300 bg-earth-secondary/20 dark:bg-slate-800 hover:bg-earth-secondary/40 transition-all">
                    Back to Selection
                </button>
            </div>
        </div>
    </main>

    <script>
        const SYLLABARY = [
            { id: 'vowels', chars: [{ s: 'Ꭰ', r: 'a' }, { s: 'Ꭱ', r: 'e' }, { s: 'Ꭲ', r: 'i' }, { s: 'Ꭳ', r: 'o' }, { s: 'Ꭴ', r: 'u' }, { s: 'Ꭵ', r: 'v' }]},
            { id: 'g', chars: [{ s: 'Ꭶ', r: 'ga' }, { s: 'Ꭷ', r: 'ka' }, { s: 'Ꭸ', r: 'ge' }, { s: 'Ꭹ', r: 'gi' }, { s: 'Ꭺ', r: 'go' }, { s: 'Ꭻ', r: 'gu' }, { s: 'Ꭼ', r: 'gv' }]},
            { id: 'h', chars: [{ s: 'Ꭽ', r: 'ha' }, { s: 'Ꭾ', r: 'he' }, { s: 'Ꭿ', r: 'hi' }, { s: 'Ꮀ', r: 'ho' }, { s: 'Ꮁ', r: 'hu' }, { s: 'Ꮂ', r: 'hv' }]},
            { id: 'l', chars: [{ s: 'Ꮃ', r: 'la' }, { s: 'Ꮄ', r: 'le' }, { s: 'Ꮅ', r: 'li' }, { s: 'Ꮆ', r: 'lo' }, { s: 'Ꮇ', r: 'lu' }, { s: 'Ꮈ', r: 'lv' }]},
            { id: 'm', chars: [{ s: 'Ꮉ', r: 'ma' }, { s: 'Ꮊ', r: 'me' }, { s: 'Ꮋ', r: 'mi' }, { s: 'Ꮌ', r: 'mo' }, { s: 'Ꮍ', r: 'mu' }]},
            { id: 'n', chars: [{ s: 'Ꮎ', r: 'na' }, { s: 'Ꮏ', r: 'hna' }, { s: 'Ꮐ', r: 'nah' }, { s: 'Ꮑ', r: 'ne' }, { s: 'Ꮒ', r: 'ni' }, { s: 'Ꮓ', r: 'no' }, { s: 'Ꮔ', r: 'nu' }, { s: 'Ꮕ', r: 'nv' }]},
            { id: 'qu', chars: [{ s: 'Ꮖ', r: 'qua' }, { s: 'Ꮗ', r: 'que' }, { s: 'Ꮘ', r: 'qui' }, { s: 'Ꮙ', r: 'quo' }, { s: 'Ꮚ', r: 'quu' }, { s: 'Ꮛ', r: 'quv' }]},
            { id: 's', chars: [{ s: 'Ꮜ', r: 'sa' }, { s: 'Ꮝ', r: 's' }, { s: 'Ꮞ', r: 'se' }, { s: 'Ꮟ', r: 'si' }, { s: 'Ꮠ', r: 'so' }, { s: 'Ꮡ', r: 'su' }, { s: 'Ꮢ', r: 'sv' }]},
            { id: 'd', chars: [{ s: 'Ꮣ', r: 'da' }, { s: 'Ꮤ', r: 'ta' }, { s: 'Ꮥ', r: 'de' }, { s: 'Ꮦ', r: 'te' }, { s: 'Ꮧ', r: 'di' }, { s: 'Ꮨ', r: 'ti' }, { s: 'Ꮩ', r: 'do' }, { s: 'Ꮪ', r: 'du' }, { s: 'Ꮫ', r: 'dv' }]},
            { id: 'dl', chars: [{ s: 'Ꮬ', r: 'dla' }, { s: 'Ꮭ', r: 'tla' }, { s: 'Ꮮ', r: 'tle' }, { s: 'Ꮯ', r: 'tli' }, { s: 'Ꮰ', r: 'tlo' }, { s: 'Ꮱ', r: 'tlu' }, { s: 'Ꮲ', r: 'tlv' }]},
            { id: 'ts', chars: [{ s: 'Ꮳ', r: 'tsa' }, { s: 'Ꮴ', r: 'tse' }, { s: 'Ꮵ', r: 'tsi' }, { s: 'Ꮶ', r: 'tso' }, { s: 'Ꮷ', r: 'tsu' }, { s: 'Ꮸ', r: 'tsv' }]},
            { id: 'w', chars: [{ s: 'Ꮹ', r: 'wa' }, { s: 'Ꮺ', r: 'we' }, { s: 'Ꮻ', r: 'wi' }, { s: 'Ꮼ', r: 'wo' }, { s: 'Ꮽ', r: 'wu' }, { s: 'Ꮾ', r: 'wv' }]},
            { id: 'y', chars: [{ s: 'Ꮿ', r: 'ya' }, { s: 'Ᏸ', r: 'ye' }, { s: 'Ᏹ', r: 'yi' }, { s: 'Ᏺ', r: 'yo' }, { s: 'Ᏻ', r: 'yu' }, { s: 'Ᏼ', r: 'yv' }]}
        ];

        const App = {
            mode: null, queue: [], results: [], currentIdx: 0,
            canvas: null, ctx: null, isDrawing: false,
            processingFeedback: false, tracingEnabled: false,
            
            init() {
                this.cacheDOM();
                this.bindEvents();
                this.setupTheme();
                this.setupCanvas();
                this.renderRows(); // Render rows on init to preserve state naturally
            },

            cacheDOM() {
                this.dom = {
                    views: {
                        home: document.getElementById('view-home'),
                        selection: document.getElementById('view-selection'),
                        writing: document.getElementById('view-writing'),
                        reading: document.getElementById('view-reading'),
                        results: document.getElementById('view-results')
                    },
                    rowsContainer: document.getElementById('rows-container'),
                    checkAll: document.getElementById('check-all'),
                    navBack: document.getElementById('nav-back'),
                    tracingContainer: document.getElementById('tracing-toggle-container'),
                    tracingCheckbox: document.getElementById('tracing-checkbox'),
                    write: {
                        prompt: document.getElementById('write-prompt'),
                        overlay: document.getElementById('write-overlay'),
                        answer: document.getElementById('write-answer'),
                        submitBtn: document.getElementById('btn-write-submit'),
                        feedbackUi: document.getElementById('write-feedback-ui'),
                        progress: document.getElementById('write-progress')
                    },
                    read: {
                        prompt: document.getElementById('read-prompt'),
                        input: document.getElementById('read-input'),
                        feedback: document.getElementById('read-feedback'),
                        progress: document.getElementById('read-progress')
                    },
                    resultsList: document.getElementById('results-list'),
                    resultsScroll: document.getElementById('results-scroll-container')
                };
            },

            bindEvents() {
                document.getElementById('theme-toggle').addEventListener('click', () => this.toggleTheme());
                
                // Navigation Logic
                this.dom.navBack.addEventListener('click', () => {
                    if (!this.dom.views.selection.classList.contains('hidden')) {
                        this.showView('home');
                    } else if (!this.dom.views.writing.classList.contains('hidden') || 
                               !this.dom.views.reading.classList.contains('hidden') || 
                               !this.dom.views.results.classList.contains('hidden')) {
                        this.showView('selection');
                    }
                });

                this.dom.checkAll.addEventListener('change', (e) => this.toggleAllGlobal(e.target.checked));
                this.dom.read.input.addEventListener('keyup', (e) => { 
                    if (e.key === 'Enter') this.checkReading(); 
                });
                window.addEventListener('resize', () => { 
                    if(!this.dom.views.writing.classList.contains('hidden')) this.resizeCanvas(); 
                });
            },

            setupTheme() {
                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                    document.body.classList.add('bg-midnight-bg', 'text-midnight-text');
                    document.body.classList.remove('bg-earth-bg', 'text-earth-text');
                }
            },

            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                if (isDark) {
                    localStorage.theme = 'dark';
                    document.body.classList.add('bg-midnight-bg', 'text-midnight-text');
                    document.body.classList.remove('bg-earth-bg', 'text-earth-text');
                    this.updateCanvasStyle(true);
                } else {
                    localStorage.theme = 'light';
                    document.body.classList.add('bg-earth-bg', 'text-earth-text');
                    document.body.classList.remove('bg-midnight-bg', 'text-midnight-text');
                    this.updateCanvasStyle(false);
                }
            },

            showView(viewId) {
                Object.values(this.dom.views).forEach(el => el.classList.add('hidden'));
                this.dom.views[viewId].classList.remove('hidden');
                this.dom.navBack.classList.toggle('hidden', viewId === 'home');
            },

            // --- SELECTION LOGIC ---
            startSelection(mode) {
                this.mode = mode;
                if (mode === 'write') {
                    this.dom.tracingContainer.classList.remove('hidden');
                    this.dom.tracingCheckbox.checked = false;
                    this.tracingEnabled = false;
                } else {
                    this.dom.tracingContainer.classList.add('hidden');
                }
                this.showView('selection');
                this.dom.rowsContainer.scrollTop = 0;
            },

            renderRows() {
                const container = this.dom.rowsContainer;
                container.innerHTML = '';
                
                SYLLABARY.forEach((row, rowIdx) => {
                    const previewHTML = row.chars.map((c, charIdx) => {
                        return `
                        <div class="syllable-item cursor-pointer rounded-md flex-1 min-w-0 flex flex-col items-center justify-center transition-all opacity-60 hover:opacity-100 py-1" 
                             data-row="${rowIdx}" data-char="${charIdx}" onclick="App.toggleChar(this)">
                            <span class="font-cherokee text-lg leading-none pointer-events-none">${c.s}</span>
                            <span class="text-[0.6rem] uppercase font-bold opacity-50 pointer-events-none truncate w-full text-center">${c.r}</span>
                        </div>`;
                    }).join('');

                    const div = document.createElement('div');
                    div.className = "p-4 rounded-xl bg-white dark:bg-midnight-secondary border border-earth-secondary/30 dark:border-slate-700 shadow-sm flex items-center gap-3 transition-colors";
                    div.innerHTML = `
                        <div class="shrink-0">
                            <input type="checkbox" id="row-cb-${rowIdx}" class="row-checkbox w-6 h-6 rounded border-gray-300 text-earth-primary focus:ring-earth-primary cursor-pointer" onclick="App.toggleRow(${rowIdx}, this.checked)">
                        </div>
                        <div class="flex flex-nowrap gap-0.5 w-full items-center" id="row-chars-${rowIdx}">
                            ${previewHTML}
                        </div>
                    `;
                    container.appendChild(div);
                });
                this.dom.checkAll.checked = false;
                this.dom.checkAll.indeterminate = false;
            },

            toggleChar(el) {
                const isSelected = el.getAttribute('data-selected') === 'true';
                this.setCharState(el, !isSelected);
                const rowIdx = el.getAttribute('data-row');
                this.updateRowCheckbox(rowIdx);
                this.updateGlobalCheckbox();
            },

            setCharState(el, selected) {
                if(selected) {
                    el.setAttribute('data-selected', 'true');
                    el.classList.remove('opacity-60');
                    el.classList.add('bg-green-600', 'text-white', 'opacity-100');
                    el.classList.remove('text-earth-text', 'dark:text-midnight-text');
                } else {
                    el.setAttribute('data-selected', 'false');
                    el.classList.add('opacity-60');
                    el.classList.remove('bg-green-600', 'text-white', 'opacity-100');
                    el.classList.add('text-earth-text', 'dark:text-midnight-text');
                }
            },

            toggleRow(rowIdx, checked) {
                const container = document.getElementById(`row-chars-${rowIdx}`);
                const chars = container.querySelectorAll('.syllable-item');
                chars.forEach(el => this.setCharState(el, checked));
                this.updateRowCheckbox(rowIdx); 
                this.updateGlobalCheckbox();
            },

            updateRowCheckbox(rowIdx) {
                const cb = document.getElementById(`row-cb-${rowIdx}`);
                const container = document.getElementById(`row-chars-${rowIdx}`);
                const chars = container.querySelectorAll('.syllable-item');
                const total = chars.length;
                const selected = container.querySelectorAll('.syllable-item[data-selected="true"]').length;
                
                cb.checked = selected === total;
                cb.indeterminate = selected > 0 && selected < total;
            },

            toggleAllGlobal(checked) {
                const rows = document.querySelectorAll('[id^="row-chars-"]');
                rows.forEach(row => {
                    const chars = row.querySelectorAll('.syllable-item');
                    chars.forEach(c => this.setCharState(c, checked));
                });
                const rowCbs = document.querySelectorAll('.row-checkbox');
                rowCbs.forEach(cb => {
                    cb.checked = checked;
                    cb.indeterminate = false;
                });
            },
            
            updateGlobalCheckbox() {
                const allChars = document.querySelectorAll('.syllable-item');
                const total = allChars.length;
                const selected = document.querySelectorAll('.syllable-item[data-selected="true"]').length;
                
                this.dom.checkAll.checked = selected === total;
                this.dom.checkAll.indeterminate = selected > 0 && selected < total;
            },

                        startSession() {
                const selectedEls = document.querySelectorAll('.syllable-item[data-selected="true"]');
                if (selectedEls.length === 0) { alert("Please select at least one character."); return; }
                
                if (this.mode === 'write') {
                    this.tracingEnabled = this.dom.tracingCheckbox.checked;
                }

                this.queue = [];
                selectedEls.forEach(el => {
                    const r = parseInt(el.getAttribute('data-row'));
                    const c = parseInt(el.getAttribute('data-char'));
                    const charObj = SYLLABARY[r].chars[c];
                    this.queue.push({ char: charObj.s, rom: charObj.r, attempts: 0, history: [] });
                });

                // PROPER SHUFFLE (Fisher-Yates) instead of the biased .sort()
                for (let i = this.queue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.queue[i], this.queue[j]] = [this.queue[j], this.queue[i]];
                }

                this.currentIdx = 0;
                this.results = [];
                this.processingFeedback = false;
                
                if (this.mode === 'write') {
                    this.showView('writing');
                    setTimeout(() => {
                        this.resizeCanvas();
                        this.loadWriteItem();
                    }, 50);
                } else {
                    this.showView('reading');
                    this.loadReadItem();
                }
            },
            // --- CANVAS LOGIC ---
            setupCanvas() {
                this.canvas = document.getElementById('drawing-canvas');
                this.ctx = this.canvas.getContext('2d');
                const getPos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - rect.left, y: clientY - rect.top };
                };
                const startDraw = (e) => {
                    if(e.cancelable) e.preventDefault(); 
                    this.isDrawing = true;
                    this.ctx.beginPath();
                    const { x, y } = getPos(e);
                    this.ctx.moveTo(x, y);
                };
                const moveDraw = (e) => {
                    if(e.cancelable) e.preventDefault(); 
                    if (!this.isDrawing) return;
                    const { x, y } = getPos(e);
                    this.ctx.lineTo(x, y);
                    this.ctx.stroke();
                };
                const endDraw = () => { this.isDrawing = false; this.ctx.beginPath(); };
                this.canvas.addEventListener('mousedown', startDraw);
                this.canvas.addEventListener('mousemove', moveDraw);
                this.canvas.addEventListener('mouseup', endDraw);
                this.canvas.addEventListener('mouseout', endDraw);
                this.canvas.addEventListener('touchstart', startDraw, { passive: false });
                this.canvas.addEventListener('touchmove', moveDraw, { passive: false });
                this.canvas.addEventListener('touchend', endDraw);
            },

            resizeCanvas() {
                if(!this.canvas) return;
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                const isDark = document.documentElement.classList.contains('dark');
                this.updateCanvasStyle(isDark);
            },
            
            updateCanvasStyle(isDark) {
                if(!this.ctx) return;
                this.ctx.lineWidth = 8;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.strokeStyle = isDark ? '#f97316' : '#3e2723';
            },

            clearCanvas() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); },

            loadWriteItem() {
                if (this.currentIdx >= this.queue.length) { this.finishSession(); return; }
                const item = this.queue[this.currentIdx];
                this.dom.write.prompt.textContent = item.rom;
                this.dom.write.answer.textContent = item.char;
                this.clearCanvas();
                
                if (this.tracingEnabled) {
                    this.dom.write.overlay.classList.remove('instant-hidden');
                    this.dom.write.overlay.classList.add('instant-visible');
                    this.dom.write.answer.classList.add('opacity-20');
                    this.dom.write.answer.classList.remove('text-earth-primary', 'dark:text-midnight-primary');
                    this.dom.write.answer.classList.add('text-gray-400');
                } else {
                    this.dom.write.overlay.classList.remove('instant-visible');
                    this.dom.write.overlay.classList.add('instant-hidden');
                    this.dom.write.answer.classList.remove('opacity-20', 'text-gray-400');
                    this.dom.write.answer.classList.add('text-earth-primary', 'dark:text-midnight-primary');
                }

                this.dom.write.submitBtn.classList.remove('hidden');
                this.dom.write.feedbackUi.classList.add('hidden');
                this.dom.write.feedbackUi.classList.remove('grid');
                this.updateProgress('write');
            },

            checkWriting() {
                this.dom.write.overlay.classList.remove('instant-hidden');
                this.dom.write.overlay.classList.add('instant-visible');
                if (this.tracingEnabled) {
                    this.dom.write.answer.classList.remove('opacity-20', 'text-gray-400');
                    this.dom.write.answer.classList.add('text-earth-primary', 'dark:text-midnight-primary');
                }
                this.dom.write.submitBtn.classList.add('hidden');
                this.dom.write.feedbackUi.classList.remove('hidden');
                this.dom.write.feedbackUi.classList.add('grid');
            },

            rateWriting(isGood) {
                const item = this.queue[this.currentIdx];
                item.attempts++;
                if (isGood) {
                    item.history.push('correct');
                    this.results.push(item);
                    this.currentIdx++;
                } else {
                    item.history.push('incorrect');
                    const remaining = this.queue.length - (this.currentIdx + 1);
                    const insertOffset = remaining <= 0 ? 0 : Math.floor(Math.random() * remaining) + 2; 
                    this.queue.splice(this.currentIdx + insertOffset, 0, item);
                    this.currentIdx++;
                }
                this.loadWriteItem();
            },

            loadReadItem() {
                if (this.currentIdx >= this.queue.length) { this.finishSession(); return; }
                const item = this.queue[this.currentIdx];
                this.dom.read.prompt.textContent = item.char;
                this.dom.read.input.value = '';
                this.dom.read.input.focus();
                this.dom.read.feedback.classList.add('opacity-0');
                this.dom.read.prompt.classList.remove('text-green-500', 'text-red-500');
                this.updateProgress('read');
            },

            checkReading() {
                if (this.processingFeedback) return;
                const input = this.dom.read.input.value.trim().toLowerCase();
                if (!input) return;

                this.processingFeedback = true;
                const item = this.queue[this.currentIdx];
                const correct = item.rom.toLowerCase();
                item.attempts++;
                
                if (input === correct) {
                    item.history.push('correct');
                    this.showFeedback(true, "Correct!");
                    this.results.push(item);
                    setTimeout(() => { 
                        this.currentIdx++; 
                        this.loadReadItem(); 
                        this.processingFeedback = false;
                    }, 800);
                } else {
                    item.history.push('incorrect');
                    this.showFeedback(false, `Oops! It's "${correct}"`);
                    const remaining = this.queue.length - (this.currentIdx + 1);
                    const insertOffset = remaining <= 0 ? 0 : Math.floor(Math.random() * remaining) + 2; 
                    this.queue.splice(this.currentIdx + insertOffset, 0, item);
                    setTimeout(() => { 
                        this.currentIdx++; 
                        this.loadReadItem(); 
                        this.processingFeedback = false;
                    }, 1500);
                }
            },

            showFeedback(isCorrect, text) {
                const fb = this.dom.read.feedback;
                const prompt = this.dom.read.prompt;
                fb.textContent = text;
                fb.className = `h-8 mt-4 font-bold text-lg transition-opacity ${isCorrect ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}`;
                prompt.classList.add(isCorrect ? 'text-green-500' : 'text-red-500');
                fb.classList.remove('opacity-0');
            },

            updateProgress(type) {
                const pct = ((this.currentIdx) / this.queue.length) * 100;
                this.dom[type].progress.style.width = `${pct}%`;
            },

            finishSession() {
                this.showView('results');
                this.renderResults();
                this.dom.resultsScroll.scrollTop = 0;
            },

            renderResults() {
                const container = this.dom.resultsList;
                container.innerHTML = '';
                const uniqueResults = [...new Set(this.results)];

                // Group by number of mistakes
                const grouped = {};
                uniqueResults.forEach(item => {
                    const mistakes = item.attempts - 1;
                    if (!grouped[mistakes]) grouped[mistakes] = [];
                    grouped[mistakes].push(item);
                });

                // Sort mistake counts descending (worst first)
                const mistakeCounts = Object.keys(grouped).map(Number).sort((a, b) => b - a);

                mistakeCounts.forEach(mistakeCount => {
                    const group = grouped[mistakeCount];
                    const groupDiv = document.createElement('div');
                    
                    const title = mistakeCount === 0 ? 'Perfect (0 Mistakes)' : `${mistakeCount} Mistake${mistakeCount > 1 ? 's' : ''}`;
                    const colorClass = mistakeCount === 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400';

                    groupDiv.innerHTML = `
                        <h3 class="text-sm font-bold uppercase tracking-wide opacity-80 mb-3 ${colorClass}">${title}</h3>
                        <div class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                            ${group.map(item => `
                                <div class="flex flex-col items-center justify-center p-4 bg-white dark:bg-midnight-secondary rounded-xl shadow-sm border border-earth-secondary/20 dark:border-slate-700">
                                    <span class="text-4xl font-cherokee font-bold dark:text-white mb-1">${item.char}</span>
                                    <span class="text-sm font-bold opacity-60 dark:text-slate-400 uppercase">${item.rom}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(groupDiv);
                });
            },
            retrySession() { this.startSession(); }
        };

        window.addEventListener('DOMContentLoaded', () => {
            App.init();
            App.showView('home');
        });
    </script>
</body>
