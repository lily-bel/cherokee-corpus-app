<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliteration Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white h-screen flex flex-col font-sans text-gray-900">

    
    <!-- Main Content: Fills remaining space -->
    <main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
        <div class="flex-1 flex flex-col min-h-0 relative group">
            <div class="flex justify-between items-center mb-1">
                <label for="transliteration" class="text-xs font-bold text-gray-500 uppercase tracking-wider">
                    Phonetics
                </label>
                <button onclick="copyText('syllabary')" class="text-gray-400 hover:text-emerald-600 text-xs flex items-center gap-1 p-1 rounded hover:bg-gray-100 transition-colors" title="Copy">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy
                </button>
            </div>
            <textarea 
                id="transliteration" 
                class="flex-1 w-full p-4 bg-gray-50 border border-gray-300 rounded-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none resize-none text-lg"
                placeholder="Enter phonetics here..."></textarea>
        </div>
        
         <div class="flex flex-col gap-3 shrink-0">
            
            <div class="flex flex-col gap-1 px-4">
                <div class="flex items-center justify-between">
                    <label for="modeSelect" class="text-xs font-bold text-gray-500 uppercase tracking-wider">
                        Phonetics Mode
                    </label>
                    <select id="modeSelect" onchange="updateModeText()" class="text-sm bg-gray-50 border border-gray-300 rounded p-1 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-gray-700">
                        <option value="classic">Classic Mode</option>
                        <option value="aspiration">Aspiration Mode</option>
                        <option value="reverse_aspiration">Reverse Aspiration</option>
                    </select>
                </div>
                <p id="modeDesc" class="text-xs text-gray-400 italic">
                    Classic Mode - CED phonetics.
                </p>
            </div>

            <div class="flex gap-2 justify-center items-stretch">
                <button onclick="runTransliterationToSyllabary()" class="flex-1 bg-gray-800 hover:bg-black text-white px-4 py-3 text-sm font-medium transition-colors flex items-center justify-center gap-2 rounded-sm">
                    <span>To Syllabary</span>
                    <i data-lucide="arrow-down" class="w-4 h-4"></i>
                </button>

                <button onclick="clearAll()" class="px-4 bg-gray-100 hover:bg-red-50 text-gray-500 hover:text-red-600 border border-gray-200 transition-colors rounded-sm" title="Clear All">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>

                <button onclick="runSyllabaryToTransliteration()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-900 px-4 py-3 text-sm font-medium transition-colors flex items-center justify-center gap-2 border border-gray-300 rounded-sm">
                    <i data-lucide="arrow-up" class="w-4 h-4"></i>
                    <span>To Phonetics</span>
                </button>
            </div>

            <div id="status-msg" class="text-center text-xs text-transparent h-4 transition-all duration-300 font-medium">
                Placeholder
            </div>
        </div>

        <!-- Bottom Half: Syllabary -->
        <div class="flex-1 flex flex-col min-h-0 relative group">
            <div class="flex justify-between items-center mb-1">
                <label for="syllabary" class="text-xs font-bold text-gray-500 uppercase tracking-wider">
                    Syllabary
                </label>
                <button onclick="copyText('syllabary')" class="text-gray-400 hover:text-emerald-600 text-xs flex items-center gap-1 p-1 rounded hover:bg-gray-100 transition-colors" title="Copy">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy
                </button>
            </div>
            <textarea 
                id="syllabary" 
                class="flex-1 w-full p-4 bg-gray-50 border border-gray-300 rounded-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none resize-none text-lg"
                placeholder="Enter syllabary here..."></textarea>
        </div>

    </main>

        <script>
        lucide.createIcons();

        //in order of evaluation
        const syllabaryMap = [
            ["hna", "Ꮏ"], ["nah", "Ꮐ"], ["qua", "Ꮖ"], ["que", "Ꮗ"], ["qui", "Ꮘ"],
            ["quo", "Ꮙ"], ["quu", "Ꮚ"], ["quv", "Ꮛ"], ["dla", "Ꮬ"], ["tla", "Ꮭ"],
            ["tle", "Ꮮ"], ["tli", "Ꮯ"], ["tlo", "Ꮰ"], ["tlu", "Ꮱ"], ["tlv", "Ꮲ"],
            ["tsa", "Ꮳ"], ["tse", "Ꮴ"], ["tsi", "Ꮵ"], ["tso", "Ꮶ"], ["tsu", "Ꮷ"],
            ["tsv", "Ꮸ"],
            
            ["ga", "Ꭶ"], ["ka", "Ꭷ"], ["ge", "Ꭸ"], ["gi", "Ꭹ"], ["go", "Ꭺ"],
            ["gu", "Ꭻ"], ["gv", "Ꭼ"], ["ha", "Ꭽ"], ["he", "Ꭾ"], ["hi", "Ꭿ"],
            ["ho", "Ꮀ"], ["hu", "Ꮁ"], ["hv", "Ꮂ"], ["la", "Ꮃ"], ["le", "Ꮄ"],
            ["li", "Ꮅ"], ["lo", "Ꮆ"], ["lu", "Ꮇ"], ["lv", "Ꮈ"], ["ma", "Ꮉ"],
            ["me", "Ꮊ"], ["mi", "Ꮋ"], ["mo", "Ꮌ"], ["mu", "Ꮍ"], ["mv", "Ᏽ"],
            ["na", "Ꮎ"], ["ne", "Ꮑ"], ["ni", "Ꮒ"], ["no", "Ꮓ"], ["nu", "Ꮔ"],
            ["nv", "Ꮕ"], ["sa", "Ꮜ"], ["se", "Ꮞ"], ["si", "Ꮟ"], ["so", "Ꮠ"],
            ["su", "Ꮡ"], ["sv", "Ꮢ"], ["da", "Ꮣ"], ["ta", "Ꮤ"], ["de", "Ꮥ"],
            ["te", "Ꮦ"], ["di", "Ꮧ"], ["ti", "Ꮨ"], ["do", "Ꮩ"], ["du", "Ꮪ"],
            ["dv", "Ꮫ"], ["wa", "Ꮹ"], ["we", "Ꮺ"], ["wi", "Ꮻ"], ["wo", "Ꮼ"],
            ["wu", "Ꮽ"], ["wv", "Ꮾ"], ["ya", "Ꮿ"], ["ye", "Ᏸ"], ["yi", "Ᏹ"],
            ["yo", "Ᏺ"], ["yu", "Ᏻ"], ["yv", "Ᏼ"],
            
            ["a", "Ꭰ"], ["e", "Ꭱ"], ["i", "Ꭲ"], ["o", "Ꭳ"], ["u", "Ꭴ"],
            ["v", "Ꭵ"], ["s", "Ꮝ"],

            ["dle", "Ꮮ"], ["dli", "Ꮯ"], ["dlo", "Ꮰ"], ["dlu", "Ꮱ"], ["dlv", "Ꮲ"],
            ["kwa", "Ꮖ"], ["kwe", "Ꮗ"], ["kwi", "Ꮘ"], ["kwo", "Ꮙ"], ["kwu", "Ꮚ"], ["kwv", "Ꮛ"],
            ["gwa", "Ꮖ"], ["gwe", "Ꮗ"], ["gwi", "Ꮘ"], ["gwo", "Ꮙ"], ["gwu", "Ꮚ"], ["gwv", "Ꮛ"],
            ["hla", "Ꮭ"], ["hle", "Ꮮ"], ["hli", "Ꮯ"], ["hlo", "Ꮰ"], ["hlu", "Ꮱ"], ["hlv", "Ꮲ"],
            ["ke", "Ꭸ"], ["ki", "Ꭹ"], ["ko", "Ꭺ"], ["ku", "Ꭻ"], ["kv", "Ꭼ"],
            ["to", "Ꮩ"], ["tu", "Ꮪ"], ["tv", "Ꮫ"],
	    ["ja", "Ꭸ"], ["je", "Ꭹ"], ["ji", "Ꭺ"], ["jo", "Ꭻ"], ["ju", "Ꭼ"], ["jv", "Ꭼ"]
        ];

        // Reverse map for quick Syllabary -> Classic Latin lookups
        const reverseSyllabaryMap = {};
        syllabaryMap.forEach(([latin, syllabary]) => {
            // Only set it if it doesn't exist so we default to the primary spelling
            if (!reverseSyllabaryMap[syllabary]) {
                reverseSyllabaryMap[syllabary] = latin;
            }
        });

        function updateModeText() {
            const mode = document.getElementById('modeSelect').value;
            const desc = document.getElementById('modeDesc');
            if (mode === 'classic') {
                desc.textContent = "Classic Mode - CED phonetics.";
            } else if (mode === 'aspiration') {
                desc.textContent = "Aspiration Mode - Pure phonetics based on Uchihara (t/th).";
            } else if (mode === 'reverse_aspiration') {
                desc.textContent = "Reverse Aspiration Mode - Switches voiced and unvoiced consonants (d/dh).";
            }
        }

        // julie mode
        function applyAspirationMode(text) {
            let s = text;
            s = s.replace(/t(?!s)/g, "th");
        
            const rules = [
                ["d", "t"], ["k", "kh"], ["g", "k"], ["j", "ts"],
                ["ch", "tsh"], ["hn", "nh"], ["hl", "lh"], ["hy", "yh"],
                // Added ["qu", "kw"] at the END to prevent the "k" from being turned into "kh"
                ["hw", "wh"], ["?", "'"], ["’", "'"], ["qu", "kw"] 
            ];
            
            rules.forEach(([oldChar, newChar]) => {
                s = s.split(oldChar).join(newChar);
            });
        
            s = s.replace(/sl(?=[aeiouv])/g, "slh");
            s = s.replace(/([^ht])s/g, "$1hs");
            return s;
        }

        // lily mode
        function applyReverseAspirationMode(text) {
            let s = text;
            s = applyAspirationMode(text);
            
            const rules = [
                ["kw", "gw"], // Added kw -> gw conversion here
                ["ts", "j"], ["k", "g"], ["t", "d"]
            ];
            
            rules.forEach(([oldChar, newChar]) => {
                s = s.split(oldChar).join(newChar);
            });
        
            return s;
        }

        function reverseAspirationToClassic(text) {
            let s = text;
            
            s = s.replace(/hs/g, "s");
            s = s.replace(/slh/g, "sl");
        
            const rules = [
                ["kw", "qu"], // Reverts kw back to qu
                ["wh", "hw"], ["yh", "hy"], ["lh", "hl"], ["nh", "hn"],
                ["tsh", "ch"], ["ts", "j"], ["'", "?"]
            ];
            rules.forEach(([oldChar, newChar]) => {
                s = s.split(oldChar).join(newChar);
            });
        
            s = s.replace(/t(?!h)/g, "d");
            s = s.replace(/th/g, "t");
        
            s = s.replace(/k(?!h)/g, "g");
            s = s.replace(/kh/g, "k");
        
            return s;
        }
        
        function reverseReverseAspirationToClassic(text) {
            let s = text;
            
            const rules = [
                ["gw", "kw"], // Reverts gw back to kw
                ["j", "ts"], ["g", "k"], ["d", "t"]
            ];
            rules.forEach(([oldChar, newChar]) => {
                s = s.split(oldChar).join(newChar);
            });
        
            return reverseAspirationToClassic(s);
        }

        function runTransliterationToSyllabary() {
            const inputElement = document.getElementById('transliteration');
            const outputElement = document.getElementById('syllabary');
            const inputText = inputElement.value;
            const mode = document.getElementById('modeSelect').value;
        
            // Pre-process the input back to classic phonetics before converting to syllabary
            let classicText = inputText.toLowerCase();
            
            if (mode === 'aspiration') {
                classicText = reverseAspirationToClassic(classicText);
            } else if (mode === 'reverse_aspiration') {
                classicText = reverseReverseAspirationToClassic(classicText);
            }
        
            let result = "";
            let i = 0;
        
            while (i < classicText.length) {
                let matched = false;
        
                // Iterates exactly in the order defined in the syllabaryMap array
                for (let j = 0; j < syllabaryMap.length; j++) {
                    const [latinKey, syllabaryChar] = syllabaryMap[j];
                    
                    if (classicText.startsWith(latinKey, i)) {
                        result += syllabaryChar;
                        i += latinKey.length;
                        matched = true;
                        break;
                    }
                }
                
                if (!matched) {
                    // We use classicText[i] here because the reverse mappings might have 
                    // changed the string length (e.g. "th" becoming "t"). Using inputText[i]
                    // would cause the index alignment to drift.
                    result += classicText[i];
                    i++;
                }
            }
        
            outputElement.value = result;
            if (inputText) showStatus("Converted to Syllabary", "text-indigo-600");
        }

            
        function runSyllabaryToTransliteration() {
            const inputElement = document.getElementById('syllabary');
            const outputElement = document.getElementById('transliteration');
            const inputText = inputElement.value;
            const mode = document.getElementById('modeSelect').value;

            let classicResult = "";
            
            // 1. Always convert Syllabary to Classic Latin first
            for (let i = 0; i < inputText.length; i++) {
                let char = inputText[i];
                classicResult += reverseSyllabaryMap[char] || char;
            }

            // 2. Modify string based on the selected mode
            let finalResult = classicResult;
            if (mode === 'aspiration') {
                finalResult = applyAspirationMode(classicResult);
            } else if (mode === 'reverse_aspiration') {
                finalResult = applyReverseAspirationMode(classicResult);
            }

            outputElement.value = finalResult;
            if (inputText) showStatus(`Converted to Phonetics (${mode.replace('_', ' ')})`, "text-emerald-600");
        }

        function clearAll() {
            document.getElementById('transliteration').value = '';
            document.getElementById('syllabary').value = '';
            showStatus("Cleared", "text-red-500");
        }

        function copyText(elementId) {
            const element = document.getElementById(elementId);
            if (!element.value) return;

            element.select();
            element.setSelectionRange(0, 99999);
            
            try {
                const successful = document.execCommand('copy');
                if(successful) {
                    showStatus("Copied to clipboard!", "text-gray-700");
                } else {
                    showStatus("Copy failed", "text-red-500");
                }
            } catch (err) {
                showStatus("Copy failed", "text-red-500");
            }
        }

        function showStatus(msg, colorClass) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = `text-center text-xs h-4 transition-all duration-300 font-bold ${colorClass}`;
            
            if (window.statusTimeout) clearTimeout(window.statusTimeout);
            
            window.statusTimeout = setTimeout(() => {
                el.className = "text-center text-xs text-transparent h-4 transition-all duration-300";
            }, 2000);
        }
    </script>
</body>
</html>
